name: PHP Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.IP }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            cd /var/www/html/dectechlive
            git pull origin main

            sudo chown -R www-data:www-data /var/www/html/dectechlive
            sudo chmod -R 755 /var/www/html/dectechlive

            sudo systemctl restart apache2
